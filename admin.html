<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM PAINEL | EGITO NCRP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ADICIONADO: Fundo do Painel */
        body {
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at top right, rgba(255, 0, 0, 0), transparent),
                            url('https://cdn.discordapp.com/attachments/1284882367156195389/1482764542047031409/Gemini_Generated_Image_sfnyqasfnyqasfny.png?ex=69b82397&is=69b6d217&hm=03d77af7046362faa88257c73c7bac161a8d0bf7fe46f3fd429e98d900e9cef7&');
            background-size: cover;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Poppins', sans-serif;
        }

        /* ORGANIZAÇÃO TOTAL DO PAINEL */
        .admin-container { max-width: 1000px; margin: 0 auto; padding-bottom: 50px; animation: fadeIn 0.8s ease; }
        
        .performance-box { 
            border: 2px solid #ff0000; 
            border-radius: 10px; 
            padding: 15px; 
            margin-bottom: 20px; 
            background: rgba(49, 45, 45, 0.623); 
            color: #111; 
            box-shadow: 0 0 20px rgba(255,0,0,0.2); 
        }
        
        .performance-box h4 { color: #ff0000; margin: 0; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }

        .admin-card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 15px; 
            padding: 30px; 
            margin-bottom: 25px; 
            border: 1px solid #ddd; 
            color: #111; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
            transition: 0.3s; 
        }
        
        .admin-card:hover { border-color: #ff0000; }

        .admin-input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            background: #f4f4f4; 
            border: 1px solid #ccc; 
            color: #111; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .color-config { 
            display: flex; 
            gap: 15px; 
            background: #f0f0f0; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            align-items: center; 
            justify-content: space-around;
            border: 1px solid #ddd;
        }

        .color-field { text-align: center; font-size: 11px; font-weight: 900; color: #333; }

        /* ANIMAÇÃO RGB PARA TEXTOS */
        .rgb-animate {
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 400% 400%;
            animation: moveGradient 5s linear infinite;
        }
        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* BOTÃO SALVAR */
        .btn-salvar-produto { 
            width: 100%; 
            padding: 20px; 
            background: #ff0000; 
            color: white; 
            border: none; 
            font-weight: 900; 
            border-radius: 10px; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.4s; 
            font-size: 18px;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }

        .btn-salvar-produto:hover { 
            background: #000; 
            box-shadow: 0 0 25px #ff0000; 
            transform: scale(1.01);
        }

        .card-producao-vendedor { 
            background: #fff; 
            border-radius: 10px; 
            padding: 20px; 
            margin-bottom: 15px; 
            color: #111; 
            border: 1px solid #eee; 
            border-left: 10px solid #ff0000; 
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }

        /* Modal de Edição */
        #modal-edit { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 2000; 
            backdrop-filter: blur(5px);
        }
        
        .modal-content { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 500px; 
            color: #111; 
            box-shadow: 0 0 50px rgba(255,0,0,0.4);
            max-height: 90vh;
            overflow-y: auto;
        }

        .btn-generic {
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-generic:hover { background: #ff0000; }

        .img-preview {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid #ddd;
            background: #eee;
        }

        .feedback-item {
            border-bottom: 1px solid #eee;
            padding: 8px 0;
            display: flex;
            justify-content: space-between;
        }

        .btn-mini { padding: 5px 10px; font-size: 10px; border: none; cursor: pointer; border-radius: 4px; margin-left: 5px; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="admin-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0;">
                <button class="btn-generic" onclick="window.location.href='index.html'">⬅ VOLTAR AO CATÁLOGO</button>
                <h1 class="rgb-animate" style="font-family: 'Bebas Neue'; font-size: 3rem; margin: 0;">PAINEL ADMINISTRATIVO</h1>
            </div>

            <div class="performance-box">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h4>📊 FEEDBACKS RECEBIDOS</h4>
                    <div>
                        <button class="btn-mini" style="background:#ff0000;" onclick="limparFeedbacks()">LIMPAR FEEDBACKS</button>
                        <button class="btn-mini" style="background:#000;" onclick="resetarSistemaPedidos()">RESETAR PEDIDOS</button>
                    </div>
                </div>
                <div id="lista-avaliacoes" style="margin-top:10px; font-size: 12px; max-height: 150px; overflow-y: auto;"></div>
            </div>

            <div class="admin-card">
                <h3 class="rgb-animate" style="font-family: 'Bebas Neue'; font-size: 2.2rem; margin-top: 0;">🛠️ CADASTRAR NOVO ITEM NO ARSENAL</h3>
                
                <input type="text" id="p-nome" class="admin-input" placeholder="NOME DO ARMAMENTO">
                
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label style="font-size: 10px; font-weight: 900;">IMAGEM DO PRODUTO:</label>
                        <input type="file" id="p-file" class="admin-input" accept="image/*">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 10px; font-weight: 900;">PREÇO BASE (R$):</label>
                        <input type="number" id="p-preco" class="admin-input" placeholder="Ex: 50000">
                    </div>
                </div>

                <textarea id="p-desc" class="admin-input" placeholder="DESCRIÇÃO TÉCNICA (Ex: Precisão alta, Calibre .50)" style="height: 80px;"></textarea>
                
                <div class="color-config">
                    <div class="color-field"><label>RGB NOME</label><br><input type="color" id="c-nome" value="#ff0000"></div>
                    <div class="color-field"><label>RGB VALOR</label><br><input type="color" id="c-valor" value="#00ff00"></div>
                    <div class="color-field"><label>RGB DESC</label><br><input type="color" id="c-desc" value="#ffffff"></div>
                </div>

                <div class="admin-input-group" style="margin-bottom: 20px;">
                    <label style="font-weight: 900; font-size: 12px; color: #ff0000;">ESTILO VISUAL DO CARD:</label>
                    <select id="p-layout" class="admin-input">
                        <option value="padrao">Padrão Egito (Estilo VIP)</option>
                        <option value="dark-gold">Dark Gold (Elite Luxo)</option>
                        <option value="modern-glass">Modern Glass (Transparente)</option>
                        <option value="military">Operacional (Militar / Black Ops)</option>
                    </select>
                </div>

                <button class="btn-salvar-produto" onclick="admAdicionarProduto()">🚀 ADICIONAR AO ARSENAL AGORA</button>
            </div>

            <div class="admin-card">
                <h3 style="font-family: 'Bebas Neue'; font-size: 2rem; color: #ff0000;">📦 PEDIDOS EM LOGÍSTICA</h3>
                <div id="lista-encomendas-adm"></div>
            </div>

            <div class="admin-card">
                <h3 style="font-family: 'Bebas Neue'; font-size: 2rem; color: #ff0000;">🔫 GERENCIAR ESTOQUE ATIVO</h3>
                <div id="lista-produtos-adm" style="display: grid; gap: 10px;"></div>
            </div>
        </div>
    </div>

    <div id="modal-edit">
        <div class="modal-content">
            <h3 class="rgb-animate" style="font-family: 'Bebas Neue'; font-size: 2rem; margin-top: 0;">EDITAR ARMAMENTO</h3>
            <input type="hidden" id="edit-index">
            
            <label style="font-size: 11px; font-weight: bold;">NOME DO ITEM:</label>
            <input type="text" id="edit-nome" class="admin-input">
            
            <label style="font-size: 11px; font-weight: bold;">VALOR (R$):</label>
            <input type="number" id="edit-preco" class="admin-input">
            
            <label style="font-size: 11px; font-weight: bold;">DESCRIÇÃO:</label>
            <textarea id="edit-desc" class="admin-input" style="height: 80px;"></textarea>
            
            <label style="font-size: 11px; font-weight: bold;">ALTERAR FOTO (OPCIONAL):</label>
            <input type="file" id="edit-file" class="admin-input" accept="image/*">
            
            <button class="btn-salvar-produto" onclick="salvarEdicao()">💾 ATUALIZAR DADOS AGORA</button>
            <button onclick="document.getElementById('modal-edit').style.display='none'" style="width: 100%; margin-top: 10px; background: #eee; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold;">CANCELAR</button>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1482626269534355547/iGrd_rIIx3Q-UvgZprIr8HSA8fqN_SG4Qeag6aKAtV0eDBJ-bX2ZPh6i9z9zawCKDq5J";

        // FUNÇÕES DE CONTROLE DE BANCO
        function limparFeedbacks() {
            if(confirm("Tem certeza que deseja apagar todos os feedbacks?")) {
                localStorage.removeItem('feedbacks');
                location.reload();
            }
        }
        function resetarSistemaPedidos() {
            if(confirm("ATENÇÃO: Isso apagará todos os pedidos. Deseja prosseguir?")) {
                localStorage.removeItem('encomendas');
                location.reload();
            }
        }

        // COMPRESSÃO DE IMAGEM
        function comprimirImagem(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxWidth = 800;
                    const scale = maxWidth / img.width;
                    canvas.width = maxWidth;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7); 
                    callback(dataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ADICIONAR PRODUTO
        function admAdicionarProduto() {
            const nome = document.getElementById('p-nome').value.trim();
            const preco = document.getElementById('p-preco').value.trim();
            const desc = document.getElementById('p-desc').value.trim();
            const layout = document.getElementById('p-layout').value;
            const fileInput = document.getElementById('p-file');
            
            const cores = {
                nome: document.getElementById('c-nome').value,
                valor: document.getElementById('c-valor').value,
                desc: document.getElementById('c-desc').value
            };

            if(!nome || !preco) return alert("⚠️ ERRO: Digite o NOME e o PREÇO!");

            const salvar = (imgFinal) => {
                let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
                produtos.push({
                    id: Date.now(),
                    nome,
                    preco: parseFloat(preco),
                    desc,
                    img: imgFinal,
                    cores,
                    layout
                });
                localStorage.setItem('produtos', JSON.stringify(produtos));
                alert("✅ SUCESSO: Armamento adicionado!");
                location.reload();
            };

            if (fileInput.files[0]) comprimirImagem(fileInput.files[0], salvar);
            else salvar(""); 
        }

        // LISTAR ESTOQUE
        function carregarProdutosAdm() {
            const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            const lista = document.getElementById('lista-produtos-adm');
            lista.innerHTML = produtos.length ? "" : "<p style='color:gray; text-align:center;'>Nenhum item no arsenal.</p>";
            
            produtos.forEach((p, index) => {
                lista.innerHTML += `
                <div class="produto-item" style="display:flex; justify-content:space-between; align-items:center; padding:15px; border:1px solid #eee; border-radius:8px; background:#f9f9f9;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${p.img || ''}" class="img-preview" alt="IMG">
                        <div>
                            <span style="font-weight:900; color:#111; display:block;">${p.nome.toUpperCase()}</span>
                            <small style="color:#666;">R$ ${p.preco.toLocaleString('pt-BR')}</small>
                        </div>
                    </div>
                    <div>
                        <button onclick="editarProduto(${index})" style="background:#007bff; color:white; border:none; padding:8px 15px; border-radius:6px; margin-right:5px; cursor:pointer; font-weight:bold;">EDITAR</button>
                        <button onclick="removerProduto(${index})" style="background:#ff0000; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; font-weight:bold;">EXCLUIR</button>
                    </div>
                </div>`;
            });
        }

        // EDITAR E SALVAR
        function editarProduto(index) {
            const produtos = JSON.parse(localStorage.getItem('produtos'));
            const p = produtos[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('edit-nome').value = p.nome;
            document.getElementById('edit-preco').value = p.preco;
            document.getElementById('edit-desc').value = p.desc || "";
            document.getElementById('modal-edit').style.display = 'flex';
        }

        function salvarEdicao() {
            const index = document.getElementById('edit-index').value;
            let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            const fileInput = document.getElementById('edit-file');

            const realizarUpdate = (imgData) => {
                produtos[index].nome = document.getElementById('edit-nome').value;
                produtos[index].preco = parseFloat(document.getElementById('edit-preco').value);
                produtos[index].desc = document.getElementById('edit-desc').value;
                if(imgData) produtos[index].img = imgData;
                
                localStorage.setItem('produtos', JSON.stringify(produtos));
                alert("✅ Produto atualizado!");
                document.getElementById('modal-edit').style.display = 'none';
                carregarProdutosAdm();
            };

            if(fileInput.files[0]) comprimirImagem(fileInput.files[0], realizarUpdate);
            else realizarUpdate(null);
        }

        // ENCOMENDAS E FEEDBACKS
        function carregarEncomendasAdm() {
            const encs = JSON.parse(localStorage.getItem('encomendas')) || [];
            const lista = document.getElementById('lista-encomendas-adm');
            lista.innerHTML = encs.length ? "" : "<p style='color:gray; text-align:center;'>Nenhuma encomenda pendente.</p>";
            
            encs.forEach((e, index) => {
                lista.innerHTML += `
                <div class="card-producao-vendedor">
                    <p><strong>PEDIDO #${e.id} - CLIENTE: ${e.cliente.nick}</strong></p>
                    <p style="font-size:13px;">Itens: ${e.itens.map(i => i.qtd + 'x ' + i.nome).join(', ')}</p>
                    <p>Status: <span style="background:#000; color:#fff; padding:3px 10px; border-radius:5px; font-weight:bold; font-size:11px;">${e.status}</span></p>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <button onclick="aceitarPedido(${index})" style="background:green; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; flex:1; font-weight:bold;">ACEITAR</button>
                        <button onclick="aceitarEncomendaCompleta(${index})" style="background:#0056b3; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; flex:1; font-weight:bold;">ACEITAR ENCOMENDA</button>
                        <button onclick="excluirEncomenda(${index})" style="background:#333; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; flex:0.3; font-weight:bold;">X</button>
                    </div>
                </div>`;
            });
        }

        async function aceitarPedido(index) {
            const nick = prompt("Nick In-Game:");
            const idDc = prompt("ID do Discord (Numérico):");
            const pass = prompt("Passaporte:");
            if(nick && idDc && pass) {
                let encs = JSON.parse(localStorage.getItem('encomendas'));
                encs[index].status = "ACEITO";
                encs[index].responsavel = { nick, idDc, pass };
                localStorage.setItem('encomendas', JSON.stringify(encs));
                
                // NOTIFICAÇÃO DISCORD
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: `✅ **STATUS ATUALIZADO**\nO pedido **#${encs[index].id}** agora está como **ACEITO** pelo responsável **${nick}**.` })
                });
                
                carregarEncomendasAdm();
            }
        }

        async function aceitarEncomendaCompleta(index) {
            const nick = prompt("Nick In-Game:");
            const idDc = prompt("ID do Discord (Numérico):");
            const pass = prompt("Passaporte:");
            const data = prompt("Data/Hora de Entrega:");
            if(nick && idDc && pass && data) {
                let encs = JSON.parse(localStorage.getItem('encomendas'));
                encs[index].status = "PRONTA";
                encs[index].responsavel = { nick, idDc, pass, data };
                localStorage.setItem('encomendas', JSON.stringify(encs));
                
                // NOTIFICAÇÃO DISCORD
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: `✅ **ENCOMENDA PRONTA**\nO pedido **#${encs[index].id}** foi concluído pelo responsável **${nick}** e está aguardando retirada!` })
                });

                carregarEncomendasAdm();
            }
        }

        function carregarFeedbacks() {
            const feedbacks = JSON.parse(localStorage.getItem('feedbacks')) || [];
            const lista = document.getElementById('lista-avaliacoes');
            lista.innerHTML = feedbacks.length ? "" : "Nenhum feedback ainda.";
            feedbacks.reverse().forEach(f => {
                lista.innerHTML += `
                <div class="feedback-item">
                    <span><strong>${f.usuario}:</strong> ${f.texto}</span>
                    <span style="color:#ff0000;">${'★'.repeat(f.estrelas)}</span>
                </div>`;
            });
        }

        function excluirEncomenda(index) {
            if(confirm("Deseja arquivar esta encomenda?")) {
                let encs = JSON.parse(localStorage.getItem('encomendas'));
                encs.splice(index, 1);
                localStorage.setItem('encomendas', JSON.stringify(encs));
                carregarEncomendasAdm();
            }
        }

        function removerProduto(index) {
            if(confirm("Remover este item permanentemente?")) {
                let produtos = JSON.parse(localStorage.getItem('produtos'));
                produtos.splice(index, 1);
                localStorage.setItem('produtos', JSON.stringify(produtos));
                carregarProdutosAdm();
            }
        }

        window.onload = () => {
            carregarProdutosAdm(); 
            carregarEncomendasAdm();
            carregarFeedbacks();
        };
    </script>
</body>
</html>
