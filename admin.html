<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM PAINEL | EGITO NCRP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 1000px; margin: 0 auto; padding-bottom: 50px; animation: fadeIn 0.8s ease; }
        .performance-box { border: 2px solid #ff0000; border-radius: 10px; padding: 15px; margin-bottom: 20px; background: white; color: #111; box-shadow: 0 0 15px rgba(255,0,0,0.1); }
        .performance-box h4 { color: #ff0000; margin: 0; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
        .admin-card { background: white; border-radius: 10px; padding: 25px; margin-bottom: 20px; border: 1px solid #ddd; color: #111; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: 0.3s; }
        .admin-card:hover { transform: translateY(-5px); }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #f9f9f9; border: 1px solid #ddd; color: #111; border-radius: 8px; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        .color-config { display: flex; gap: 10px; background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 15px; align-items: center; justify-content: space-around; }
        .color-field { text-align: center; font-size: 10px; font-weight: bold; }
        .btn-salvar-produto { width: 100%; padding: 15px; background: #ff0000; color: white; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 16px; }
        .btn-salvar-produto:hover { background: #111; box-shadow: 0 0 20px #ff0000; letter-spacing: 2px; }
        .card-producao-vendedor { background: #fdfdfd; border-radius: 8px; padding: 20px; margin-bottom: 20px; color: #111; border: 1px solid #eee; border-left: 8px solid red; position: relative; animation: slideIn 0.5s ease; }
        .btn-excluir-enc { background: #000; color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: 900; display: none; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="admin-container">
            <button class="btn-generic" onclick="window.location.href='index.html'" style="margin-bottom:20px; width: auto;">⬅ VOLTAR AO INÍCIO</button>
            <div class="performance-box">
                <h4>📊 FEEDBACK E AVALIAÇÕES DOS CLIENTES</h4>
                <div id="lista-avaliacoes" style="margin-top:10px; font-size: 12px; max-height: 200px; overflow-y: auto;"></div>
            </div>
            <div class="admin-card">
                <h3 style="font-family: 'Bebas Neue'; font-size: 2rem;">🛠️ CONFIGURAR NOVO ARMAMENTO</h3>
                <input type="text" id="p-nome" class="admin-input" placeholder="NOME DO ARMAMENTO">
                <input type="file" id="p-file" class="admin-input" accept="image/*">
                <input type="number" id="p-preco" class="admin-input" placeholder="VALOR BASE (R$)">
                <textarea id="p-desc" class="admin-input" placeholder="DESCRIÇÃO TÉCNICA" style="height: 60px;"></textarea>
                
                <div class="color-config">
                    <div class="color-field"><label>COR NOME</label><br><input type="color" id="c-nome" value="#333333"></div>
                    <div class="color-field"><label>COR VALOR</label><br><input type="color" id="c-valor" value="#ff0000"></div>
                    <div class="color-field"><label>COR DESC</label><br><input type="color" id="c-desc" value="#888888"></div>
                </div>

                <div class="admin-input-group" style="margin-bottom: 15px;">
                    <label style="font-weight: bold; font-size: 12px;">ESTILO DO CARD:</label>
                    <select id="p-layout" class="admin-input">
                        <option value="padrao">Padrão Clean (Borda Vermelha)</option>
                        <option value="dark-gold">Dark Gold (Luxo)</option>
                        <option value="modern-glass">Modern Glass (Transparente)</option>
                        <option value="military">Operacional (Militar/Dark)</option>
                    </select>
                </div>

                <button class="btn-salvar-produto" onclick="admAdicionarProduto()">ADICIONAR AO ARSENAL</button>
            </div>
            <div class="admin-card">
                <h3 style="font-family: 'Bebas Neue'; font-size: 2rem;">📦 GESTÃO DE LOGÍSTICA</h3>
                <div id="lista-encomendas-adm"></div>
            </div>
            <div class="admin-card">
                <h3 style="font-family: 'Bebas Neue'; font-size: 2rem;">🔫 ESTOQUE ATIVO</h3>
                <div id="lista-produtos-adm"></div>
            </div>
        </div>
    </div>
    <script>
        function carregarProdutosAdm() {
            const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            const lista = document.getElementById('lista-produtos-adm');
            lista.innerHTML = "";
            produtos.forEach((p, index) => {
                lista.innerHTML += `<div class="produto-item"><span>${p.nome}</span><div><button class="btn-edit" onclick="editarProduto(${index})">EDIT</button><button class="btn-del" onclick="removerProduto(${index})">X</button></div></div>`;
            });
        }
        function admAdicionarProduto() {
            const nome = document.getElementById('p-nome').value;
            const preco = document.getElementById('p-preco').value;
            const desc = document.getElementById('p-desc').value;
            const layout = document.getElementById('p-layout').value;
            const fileInput = document.getElementById('p-file');
            const cores = {
                nome: document.getElementById('c-nome').value,
                valor: document.getElementById('c-valor').value,
                desc: document.getElementById('c-desc').value
            };
            if(!nome || !preco) return alert("Erro: Nome e Preço são obrigatórios!");
            const salvar = (imgData) => {
                let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
                produtos.push({ id: Date.now(), nome, preco: parseFloat(preco), desc, img: imgData, cores, layout });
                localStorage.setItem('produtos', JSON.stringify(produtos));
                alert("Armamento catalogado!");
                location.reload();
            };
            if(fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => salvar(e.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            } else { salvar(""); }
        }
        function carregarEncomendasAdm() {
            const encs = JSON.parse(localStorage.getItem('encomendas')) || [];
            const lista = document.getElementById('lista-encomendas-adm');
            lista.innerHTML = encs.length ? "" : "Nenhuma encomenda pendente.";
            encs.forEach((e, index) => {
                const respInfo = e.responsavel ? `<p style="color:#ff0000"><strong>RESPONSÁVEL: ${e.responsavel}</strong></p>` : "";
                const feedback = e.avaliacao ? `<div style="background:#fff3cd; padding:10px; margin-top:5px; border-radius:5px; border:1px solid #ffeeba;">⭐ ${e.avaliacao.estrelas}/5 - "${e.avaliacao.comentario}"</div>` : "";
                const displayExcluir = e.status === 'NEGADO' || e.status === 'ENTREGUE' ? 'block' : 'none';
                lista.innerHTML += `
                <div class="card-producao-vendedor">
                    <p><strong>PEDIDO #${e.id} - ${e.cliente.nick}</strong></p>
                    <p>Itens: ${e.itens.map(i => i.qtd + 'x ' + i.nome).join(', ')}</p>
                    <p>Status: <span style="background:#eee; padding:2px 8px; border-radius:4px; font-weight:bold;">${e.status}</span></p>
                    ${respInfo}
                    ${feedback}
                    <div class="producao-footer">
                        <button class="btn-producao aceitar" onclick="mudarStatus(${index}, 'ACEITO')">ACEITAR</button>
                        <button class="btn-producao produzindo" onclick="mudarStatus(${index}, 'PRODUZINDO')">PRODUZINDO</button>
                        <button class="btn-producao pronta" onclick="mudarStatus(${index}, 'PRONTA')">PRONTA</button>
                        <button class="btn-producao negar" onclick="mostrarBotaoExcluir(${index})">NEGAR</button>
                    </div>
                    <button id="btn-excluir-${index}" class="btn-excluir-enc" style="display:${displayExcluir}" onclick="excluirPedido(${index})">🗑️ EXCLUIR REGISTRO DEFINITIVAMENTE</button>
                </div>`;
            });
        }
        function mostrarBotaoExcluir(index) { mudarStatus(index, 'NEGADO'); }
        function excluirPedido(index) {
            if(confirm("Deseja apagar esta encomenda do histórico para evitar acúmulo?")) {
                let encs = JSON.parse(localStorage.getItem('encomendas'));
                encs.splice(index, 1);
                localStorage.setItem('encomendas', JSON.stringify(encs));
                carregarEncomendasAdm();
            }
        }
        function mudarStatus(index, status) {
            let encs = JSON.parse(localStorage.getItem('encomendas'));
            let item = encs[index];
            if (!item.responsavel) {
                let nick = prompt("Seu Nick de Vendedor:");
                if(!nick) return;
                item.responsavel = nick;
            }
            if(status === 'PRODUZINDO') item.prazo = prompt("Qual o prazo?");
            if(status === 'PRONTA') {
                item.local = prompt("Local de entrega:");
                item.horario = prompt("Hora prevista:");
            }
            item.status = status;
            localStorage.setItem('encomendas', JSON.stringify(encs));
            carregarEncomendasAdm();
        }
        function removerProduto(index) {
            if(confirm("Excluir item?")) {
                let produtos = JSON.parse(localStorage.getItem('produtos'));
                produtos.splice(index, 1);
                localStorage.setItem('produtos', JSON.stringify(produtos));
                carregarProdutosAdm();
            }
        }
        carregarProdutosAdm(); carregarEncomendasAdm();
    </script>
</body>
</html>
